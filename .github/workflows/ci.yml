name: CI Workflow with Multiple Trello Cards

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run CI / Tests
      run: |
        echo "Running tests..."
        # Replace this with your actual CI/test commands
        echo "Tests passed"

    - name: Gather Commit Info
      id: commit_info
      run: |
        echo "COMMIT_MSG=$(git log -1 --pretty=%B)" >> $GITHUB_ENV
        echo "COMMIT_AUTHOR=$(git log -1 --pretty=%an)" >> $GITHUB_ENV
        echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV

    - name: Create Multiple Trello Cards on Success
      if: success()
      run: |
        for i in 1 2 3 4; do
          curl -X POST "https://api.trello.com/1/cards" \
            -d "key=${{ secrets.TRELLO_KEY }}" \
            -d "token=${{ secrets.TRELLO_TOKEN }}" \
            -d "idList=${{ secrets.TRELLO_LIST_ID }}" \
            -d "name=CI Card $i - $BRANCH_NAME - $(date '+%Y-%m-%d %H:%M:%S')" \
            -d "desc=Commit Message: $COMMIT_MSG
Author: $COMMIT_AUTHOR
Branch: $BRANCH_NAME
Workflow run: $GITHUB_RUN_ID
This is automatically created card number $i by GitHub Actions after a successful CI run."
        done